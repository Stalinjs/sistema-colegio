{% extends "plantilla.html" %}
{% block contenido %}

<div class="container">
    <div class="page-inner">
        <h3 class="fw-bold mb-3">Panel de Administración</h3>
        <div class="row g-4">
            <!-- Usuarios -->
            <div class="col-sm-6 col-md-3">
                <a href="{% url 'usuarios_lista' %}" class="text-decoration-none">
                    <div class="card shadow-sm p-3 d-flex align-items-center"
                         style="border-left: 8px solid #0d6efd;"
                         onmouseover="this.style.transform='scale(1.05)';this.style.transition='0.2s';"
                         onmouseout="this.style.transform='scale(1)';">

                        <div class="rounded p-2 me-3 text-white" style="background:#0d6efd;">
                            <i class="fas fa-users fa-lg"></i>
                        </div>

                        <div>
                            <div class="text-muted small">Usuarios</div>
                            <strong>Gestión</strong>
                        </div>

                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
