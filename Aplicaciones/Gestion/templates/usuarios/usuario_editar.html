{% extends 'plantilla.html' %}
{% block contenido %}

<div class="container mt-4">
    <h2 class="mb-4">Editar Usuario</h2>

    <form method="POST" class="card p-4 shadow" id="frm_usuario">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Cédula</label>
                <input type="text" name="cedula" class="form-control" value="{{ usuario.cedula }}">
            </div>

            <div class="col-md-4 mb-3">
                <label>Nombres</label>
                <input type="text" name="nombres" class="form-control" value="{{ usuario.nombres }}">
            </div>

            <div class="col-md-4 mb-3">
                <label>Apellido Paterno</label>
                <input type="text" name="apellido_paterno" class="form-control" value="{{ usuario.apellido_paterno }}">
            </div>

            <div class="col-md-4 mb-3">
                <label>Apellido Materno</label>
                <input type="text" name="apellido_materno" class="form-control" value="{{ usuario.apellido_materno }}">
            </div>

            <div class="col-md-4 mb-3">
                <label>Correo</label>
                <input type="email" name="correo" class="form-control" value="{{ usuario.correo }}">
            </div>

            <div class="col-md-4 mb-3">
                <label>Teléfono</label>
                <input type="text" name="telefono" class="form-control" value="{{ usuario.telefono }}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Dirección</label>
                <input type="text" name="direccion" class="form-control" value="{{ usuario.direccion }}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Rol</label>
                {% if usuario.rol == 'admin' %}
                    <input type="text" class="form-control" value="Administrador" disabled>
                {% else %}
                    <select name="rol" class="form-control" required>
                        <option value="secretaria" {% if usuario.rol == 'secretaria' %}selected{% endif %}>Secretaria</option>
                        <option value="docente" {% if usuario.rol == 'docente' %}selected{% endif %}>Docente</option>
                    </select>
                {% endif %}
            </div>
        </div>

        <div class="mt-3">
            <a href="{% url 'usuarios_lista' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>
    </form>
</div>


<script>
$("#frm_usuario").validate({
    rules: {
        cedula: {
            required: true,
            minlength: 10,
            maxlength: 10,
            number: true
        },
        nombres: {
            required: true,
            minlength: 3
        },
        apellido_paterno: {
            required: true,
            minlength: 3
        },
        correo: {
            required: true,
            email: true
        },
        rol: {
            required: true
        }
    },
    messages: {
        cedula: {
            required: "Ingrese la cédula",
            minlength: "La cédula debe tener 10 dígitos",
            maxlength: "La cédula debe tener 10 dígitos",
            number: "Solo se permiten números"
        },
        nombres: {
            required: "Ingrese los nombres",
            minlength: "Debe tener al menos 3 caracteres"
        },
        apellido_paterno: {
            required: "Ingrese el apellido paterno",
            minlength: "Debe tener al menos 3 caracteres"
        },
        correo: {
            required: "Ingrese el correo electrónico",
            email: "Ingrese un correo válido"
        },
        rol: {
            required: "Seleccione un rol"
        }
    },
    errorElement: "div",
    errorClass: "text-danger mt-1"
});
</script>

{% endblock %}
