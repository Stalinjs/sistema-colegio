{% extends "plantilla.html" %}
{% load static %}

{% block body_class %}login-body{% endblock %}

{% block contenido %}

<div class="login-page">
  <div class="login-bg">

    <!-- CARRUSEL -->
    <div id="loginCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="5000">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="{% static 'img/carrusel1.jpg' %}" alt="Slide 1">
        </div>
        <div class="carousel-item">
          <img src="{% static 'img/carrusel2.jpg' %}" alt="Slide 2">
        </div>
        <div class="carousel-item">
          <img src="{% static 'img/carrusel3.jpg' %}" alt="Slide 3">
        </div>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="login-overlay"></div>

    <!-- LOGIN -->
    <div class="login-center px-3">
      <div class="card login-card shadow-lg border-0">
        <div class="card-body p-4">

          <div class="text-center mb-3">
            <div class="login-logo-wrapper mb-2">
              <img src="{% static 'img/logo.jpg' %}" class="login-logo">
            </div>
            <h5 class="fw-bold mb-0">Sistema Académico</h5>
            <small class="text-muted">
              Unidad Educativa Monseñor Leonidas Proaño
            </small>
          </div>

          <form method="POST" action="{% url 'login_validar' %}" id="frm_login">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" name="cedula" placeholder="Ingrese la cédula">
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" name="password" placeholder="Ingrese la contraseña">
            </div>

            <button class="btn btn-primary w-100">
              Iniciar sesión
            </button>

            <div class="text-center mt-3">
              <a href="{% url 'recuperar_password' %}" class="small">
                ¿Olvidó su contraseña?
              </a>
            </div>
          </form>

        </div>
      </div>
    </div>

  </div>
</div>

<script>
$("#frm_login").validate({
    rules: {
        cedula: {
            required: true,
            minlength: 10,
            maxlength: 10,
            number: true
        },
        password: {
            required: true,
        }
    },
    messages: {
        cedula: {
            required: "Ingrese la cédula",
            minlength: "La cédula debe tener 10 dígitos",
            maxlength: "La cédula debe tener 10 dígitos",
            number: "Solo se permiten números"
        },
        password: {
            required: "Ingrese la contraseña"
        },
    },
    errorElement: "div",
    errorClass: "text-danger mt-1"
});
</script>

{% endblock %}
